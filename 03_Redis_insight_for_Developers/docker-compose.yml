services:
  redis:
    image: redis:8
    container_name: redis-lesson-03
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight-lesson-03
    ports:
      - "5540:5540"
    volumes:
      - redisinsight-data:/data
    depends_on:
      - redis

volumes:
  redis-data:
  redisinsight-data:
